[mod-name]
visible-planets=Visible Planets in Space

[mod-description]
visible-planets=Renderuj planetę za platformami podczas przebywania na orbicie. Teraz z efektem paralaksy, rotacją i wsparciem dla modyfikacji!

[mod-setting-name]
visible-planets-regen-renders=Regeneruj wszystkie renderowane planety
visible-planets-planet-pos-x=Pozycja planety X
visible-planets-planet-pos-y=Pozycja planety Y
visible-planets-planet-init-dist=Odległość pojawienia się planety
visible-planets-planet-init-scale=Początkowa skala planety
visible-planets-planet-scale=Ostateczna skala planety
visible-planets-planet-anim-dur=Czas trwania animacji planety
visible-planets-planet-angle=Kąt planety
visible-planets-enable-parallax=Włącz efekt paralaksy planety
visible-planets-disable-mp-parallax=Wyłącz paralaksę w trybie wieloosobowym
visible-planets-parallax-factor=Współczynnik paralaksy
visible-planets-enable-rotation=Włącz rotację planety
visible-planets-rotation-speed=Prędkość rotacji
visible-planets-override-show-planets=Nadpisz ukrywanie lokalizacji przez mody
visible-planets-planetslib-compat=Renderuj pobliskie planety/księżyce (kompatybilne z PlanetsLib)
visible-planets-planetslib-scale=Skalowanie ciał niebieskich w tle
visible-planets-planetslib-dist=Odległość ciał w tle od środka
visible-planets-planetslib-init-angle=Początkowy kąt renderowania ciał w tle
visible-planets-planetslib-spacing-mult=Mnożnik odstępów ciał w tle
visible-planets-planetslib-tint=Odcień renderowania tła
visible-planets-enable-blur=Włącz rozmycie planety
visible-planets-blur-intensity=Intensywność rozmycia

[mod-setting-description]
visible-planets-regen-renders=Działa tylko w grze! Włącz to, aby usunąć wszystkie renderowane planety, co pozwoli na ich regenerację z nowymi ustawieniami. Jest to wymagane tylko do aktualizacji platform, które nie mogą się poruszać; zautomatyzowane zaktualizują się same podczas odlotu. (To ustawienie zostanie automatycznie wyłączone po zakończeniu).
visible-planets-planet-pos-x=Pozycja spoczynkowa renderowanej planety. Ujemne wartości przesuną planetę w lewo.
visible-planets-planet-pos-y=Pozycja spoczynkowa renderowanej planety. Ujemne wartości przesuną planetę na północ/w górę.
visible-planets-planet-init-dist=Początkowa odległość planety podczas pojawiania się. Planeta pojawi się w tej odległości powyżej swojej pozycji spoczynkowej i przesunie się w dół. Odległość odjazdu to po prostu dwukrotność tej wartości.
visible-planets-planet-init-scale=Początkowa skala planety podczas pojawiania/zanikania, domyślnie 0, aby ukryć tworzenie i usuwanie. Ograniczone do ostatecznej skali, przy której planeta nie będzie się już skalować podczas animacji.
visible-planets-planet-scale=Skala spoczynkowa renderowanej planety. Duże wartości spowodują pikselizację planety, ale domyślna wartość to już 6x. Możesz zmniejszyć tę wartość, aby uzyskać mniejszą, ale ładniejszą planetę.
visible-planets-planet-anim-dur=Czas trwania animacji planety w tickach. Niższe wartości sprawią, że planeta będzie poruszać się szybciej (60 ticków = 1 sekunda).
visible-planets-planet-angle=Sprite planety zostanie obrócony zgodnie z ruchem wskazówek zegara o podany kąt w stopniach. Wartość musi być między 0 a 359. Jeśli używasz tej opcji, prawdopodobnie zechcesz wyłączyć rotację planety.
visible-planets-enable-parallax=Włącz efekt paralaksy dla renderowanych planet. Sprawi to, że planeta będzie się lekko poruszać podczas rozglądania się, co doda głębi.
visible-planets-disable-mp-parallax=Wyłącza paralaksę w trybie wieloosobowym, ponieważ może ona zachowywać się dziwnie dla graczy innych niż host. Nadpisuje powyższe ustawienie.
visible-planets-parallax-factor=Siła efektu paralaksy. Wyższe wartości sprawią, że planeta będzie poruszać się mniej, a niższe wartości – więcej. Minimalna wartość to 0.1.
visible-planets-enable-rotation=Włącz rotację renderowanych planet. Sprawi to, że planeta będzie się obracać wokół swojego środka. Wygląda to nieco dziwnie.
visible-planets-rotation-speed=Prędkość rotacji planety w stopniach na tick. Wyższe wartości sprawią, że planeta będzie obracać się szybciej zgodnie z ruchem wskazówek zegara. Wartość musi być między -180 a 180 (choć 180 to ZNACZNIE za szybko, domyślnie jest to 0.01).
visible-planets-override-show-planets=Inne mody mogą wyłączyć renderowanie niektórych lokalizacji, takich jak pasy asteroid. Włącz to, aby wymusić renderowanie wszystkich lokalizacji, o ile posiadają one sprite, który można wyrenderować.
visible-planets-planetslib-compat=Gdy ta opcja jest włączona, księżyce dodane przez mody będą pokazywać swoje ciało macierzyste za sobą, a planety z księżycami będą pokazywać swoje księżyce w podobny sposób (musi to być księżyc zgodny z PlanetsLib, aby działało).
visible-planets-planetslib-scale=Skala ciał renderowanych przez kompatybilność z PlanetLib, względem ciała macierzystego.
visible-planets-planetslib-x=Pozycja X pierwszego obiektu w tle. Planety z wieloma księżycami będą generować dodatkowe obiekty względem tej pozycji.
visible-planets-planetslib-y=Pozycja Y pierwszego obiektu w tle. Planety z wieloma księżycami będą generować dodatkowe obiekty względem tej pozycji.
visible-planets-planetslib-dist=Odległość od środka ciała macierzystego dla renderów kompatybilnych z PlanetLib. Niskie wartości spowodują renderowanie ciał pod główną planetą.
visible-planets-planetslib-init-angle=Początkowy kąt pierwszego obiektu w tle w stopniach. Niezbyt użyteczne, jeśli włączona jest rotacja planety, ale przydatne w innych przypadkach.
visible-planets-planetslib-spacing-mult=Domyślny odstęp jest równomierny wokół ciała macierzystego. Mnożniki niższe niż 1 zbliżą je do siebie. Wartości wyższe niż 1 spowodują nierównomierne odstępy.
visible-planets-planetslib-tint=Niższe wartości sprawią, że obiekty w tle będą ciemniejsze. Wartość 1 spowoduje ich normalne renderowanie.
visible-planets-enable-blur=Nakłada efekt rozmycia na sprite'y widocznych planet. Może powodować problemy z wydajnością.
visible-planets-blur-intensity=Kontroluje intensywność efektu rozmycia. Wyższe wartości sprawią, że planeta będzie bardziej rozmyta.
